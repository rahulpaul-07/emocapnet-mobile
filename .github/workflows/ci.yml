name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check src tests
      - run: ruff format --check src tests

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install (CPU torch + serve/onnx extras)
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev,serve,onnx]"
      - name: Cache HF tokenizer
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-${{ runner.os }}-gpt2
      - name: Unit tests
        run: pytest -m "not slow" --cov=emocapnet --cov-report=term-missing

  e2e-smoke:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install (CPU torch + serve/onnx extras)
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev,serve,onnx]"
      - name: Slow tests (end-to-end + ONNX parity)
        run: pytest -m slow
      - name: End-to-end smoke pipeline (train -> eval -> quantize -> latency)
        run: emocapnet smoke --out runs/smoke --epochs 1
      - name: Upload smoke artifacts
        uses: actions/upload-artifact@v4
        with:
          name: smoke-summary
          path: runs/smoke/run/smoke_summary.json
